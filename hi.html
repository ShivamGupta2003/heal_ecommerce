<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smooth Scroll Animation</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 60px 20px;
    }

    .card {
      height: 180px;
      margin-bottom: 40px;
      border-radius: 20px;
      background-image: url("https://picsum.photos/500/300");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;

      /* smoother animation */
      opacity: 0;
      transform: translateY(80px) scale(0.95);
      transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    .content {
      position: relative;
      z-index: 2;
    }

    /* visible state */
    .card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    h3 {
      margin: 0;
      font-size: 22px;
    }

    p {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 10 cards -->
    <div class="card"><div class="content"><h3>Card 1</h3></div></div>
    <div class="card"><div class="content"><h3>Card 2</h3></div></div>
    <div class="card"><div class="content"><h3>Card 3</h3></div></div>
    <div class="card"><div class="content"><h3>Card 4</h3></div></div>
    <div class="card"><div class="content"><h3>Card 5</h3></div></div>
    <div class="card"><div class="content"><h3>Card 6</h3></div></div>
    <div class="card"><div class="content"><h3>Card 7</h3></div></div>
    <div class="card"><div class="content"><h3>Card 8</h3></div></div>
    <div class="card"><div class="content"><h3>Card 9</h3></div></div>
    <div class="card"><div class="content"><h3>Card 10</h3></div></div>
  </div>

  <script>
    const cards = document.querySelectorAll(".card");

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, index) => {
        if (entry.isIntersecting) {
          const el = entry.target;

          // apply delay smoothly
          el.style.transitionDelay = `${index * 500}ms`;

          el.classList.add("show");
          observer.unobserve(el); // animate once
        }
      });
    }, {
      threshold: 0.2
    });

    cards.forEach((card) => observer.observe(card));
  </script>

</body>
</html>
